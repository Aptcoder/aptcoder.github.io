<!DOCTYPE html>
<html lang="en-us">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="utf8">
        <meta name="description" content="">
        <title>

        </title>
        <link href="https://fonts.googleapis.com/css?family=Varela+Round&display=swap" rel="stylesheet">
        <link href="style.css" rel="stylesheet">
    </head>
    <body>
        <div class="background"></div><div class="image-box">
            <a href="https://piggyvest.com" class="logo-link">
                <img class="image" src="https://dashboard.piggyvest.com/static/media/piggyvest-logo.0b78a8fa.svg">
            </a>
        </div>
        <div class="form-box">
            <div class="form-header">
                <h1 style="color:#083e9e;font-weight: 700;font-size: 1.3rem;">
                    Create A Secure Account 
                </h1>
                <p style="font-size: 1rem;">
                    Welcome to the future of savings and investments
                </p>
            </div>
                <form class="form-main">
                    <div class="form-element">
                        <label class="form-element-label">
                            Full name
                        </label>
                        <input placeholder="Full name">
                    </div>
                    <div class="form-element">
                        <label class="form-element-label" >
                            Email address
                        </label>
                        <input placeholder="Email address">
                    </div>
                    <div class="form-element">
                        <label class="form-element-label">
                            Phone Number 
                        </label>
                        <input placeholder="Phone Number">
                    </div>
                    <div class="form-element">
                        <label class="form-element-label">
                            Password
                        </label >
                        <input placeholder="Password">
                    </div>
                    <div class="form-element">
                        <label class="form-element-label">
                            Referrer Phone or Promo Code (Optional)
                        </label>
                        <input placeholder="Referrer Phone or Promo Code">
                    </div>
                    <div class="form-element">
                        <label class="form-element-label">
                           How Did You Hear About Us (Optional)
                        </label>
                        <input placeholder=>
                    </div>
                    <div class="form-element">
                        <button>
                            CREATE ACCOUNT
                        </button>
                    </div>
                </form>
            </div>
            <div class="login-box">
               <a class="login-link"><p>Already have an account? Log in</p></a>  
            </div>
    </body>
</html>
